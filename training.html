<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fitness Tracker - Training</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#071225">
  <link rel="apple-touch-icon" href="icon-192.png">
</head>
<body>
  <div class="page-shell page-shell-app">
    <header class="page-header app-page-header">
      <a class="app-back-button" href="dashboard.html" aria-label="Zurück zum Dashboard">
        <svg class="app-back-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M15 6L9 12L15 18"></path>
        </svg>
      </a>
    </header>

    <main class="training-page">
      <section class="app-hero-card training-hero-card">
        <div class="training-hero-inner">
          <div id="trainingHeroLabel" class="training-hero-label">Letztes Training</div>
          <div id="lastTrainingName" class="training-hero-name">Noch kein Training</div>
          <div id="lastTrainingDate" class="training-hero-date">-</div>

          <div id="activeTrainingInline" class="training-active-inline hidden">
            
            <div id="activeTrainingTime" class="training-active-inline-time">00:00:00</div>
            <button id="resumeActiveTraining" class="dashboard-summary-primary-btn" type="button">
              Fortsetzen
            </button>
          </div>
        </div>
      </section>

      <section class="dashboard-nav-list dashboard-nav-list-no-icons training-nav-list">
        <a href="training-start-list.html" class="dashboard-nav-button dashboard-nav-button-no-icon">
          <span class="nav-left nav-left-no-icon">
            <span class="nav-text">
              <span class="nav-title">Training starten</span>
            </span>
          </span>
          <img class="nav-chevron-img" src="icon-chevron.svg" alt="">
        </a>

        <a href="training-history.html" class="dashboard-nav-button dashboard-nav-button-no-icon">
          <span class="nav-left nav-left-no-icon">
            <span class="nav-text">
              <span class="nav-title">Training Historie</span>
            </span>
          </span>
          <img class="nav-chevron-img" src="icon-chevron.svg" alt="">
        </a>

        <a href="training-planner.html" class="dashboard-nav-button dashboard-nav-button-no-icon">
          <span class="nav-left nav-left-no-icon">
            <span class="nav-text">
              <span class="nav-title">Training planen</span>
            </span>
          </span>
          <img class="nav-chevron-img" src="icon-chevron.svg" alt="">
        </a>
      </section>
    </main>
  </div>

  <script type="module" src="training.js"></script>
</body>
</html>
