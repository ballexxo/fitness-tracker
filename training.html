<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fitness Tracker - Training</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#28c267">
  <link rel="apple-touch-icon" href="icon-192.png">
</head>
<body>
  <div class="page-shell">
    <header class="page-header">
        <button class="back-button" type="button" onclick="history.back()">←</button>
    </header>

    <div class="page-title">Training</div>

    <section class="page-card">
      <div class="module-badge">Training</div>

      <div class="info-box" style="max-width:100%; margin-bottom:24px;">
        <div class="streak-label">Letztes Training</div>
        <div class="streak-value" id="lastTrainingName">Noch kein Training</div>
        <div class="streak-text" id="lastTrainingDate">-</div>
      </div>

      <div class="dashboard-buttons" style="max-width:100%;">
        <a href="training-start-list.html" class="main-button">Training Starten</a>
        <a href="training-history.html" class="main-button">Training Historie</a>
      </div>
    </section>
  </div>

  <script type="module" src="training.js"></script>

</html>
