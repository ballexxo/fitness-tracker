name: Daily Reminders

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Welcher Reminder soll gesendet werden?"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - morning
          - evening
          - weekly-report
      date:
        description: "Optionales Test-Datum im Format YYYY-MM-DD"
        required: false
        default: ""

  schedule:
    - cron: "0 6 * * *"
    - cron: "0 17 * * *"
    - cron: "0 8 * * *"

jobs:
  morning-reminder:
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '0 6 * * *') ||
      (github.event_name == 'workflow_dispatch' && (inputs.mode == 'morning' || inputs.mode == 'all'))
    runs-on: ubuntu-latest
    steps:
      - name: Send morning reminder
        run: |
          if [ -n "${{ inputs.date }}" ]; then
            curl -X POST "${{ secrets.SUPABASE_FUNCTION_URL }}" \
              -H "Content-Type: application/json" \
              -d "{\"mode\":\"morning\",\"date\":\"${{ inputs.date }}\"}"
          else
            curl -X POST "${{ secrets.SUPABASE_FUNCTION_URL }}" \
              -H "Content-Type: application/json" \
              -d "{\"mode\":\"morning\"}"
          fi

  evening-reminder:
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '0 17 * * *') ||
      (github.event_name == 'workflow_dispatch' && (inputs.mode == 'evening' || inputs.mode == 'all'))
    runs-on: ubuntu-latest
    steps:
      - name: Send evening reminder
        run: |
          if [ -n "${{ inputs.date }}" ]; then
            curl -X POST "${{ secrets.SUPABASE_FUNCTION_URL }}" \
              -H "Content-Type: application/json" \
              -d "{\"mode\":\"evening\",\"date\":\"${{ inputs.date }}\"}"
          else
            curl -X POST "${{ secrets.SUPABASE_FUNCTION_URL }}" \
              -H "Content-Type: application/json" \
              -d "{\"mode\":\"evening\"}"
          fi

  weekly-report-reminder:
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '0 8 * * *') ||
      (github.event_name == 'workflow_dispatch' && (inputs.mode == 'weekly-report' || inputs.mode == 'all'))
    runs-on: ubuntu-latest
    steps:
      - name: Send weekly report reminder
        run: |
          if [ -n "${{ inputs.date }}" ]; then
            curl -X POST "${{ secrets.SUPABASE_FUNCTION_URL }}" \
              -H "Content-Type: application/json" \
              -d "{\"mode\":\"weekly-report\",\"date\":\"${{ inputs.date }}\"}"
          else
            curl -X POST "${{ secrets.SUPABASE_FUNCTION_URL }}" \
              -H "Content-Type: application/json" \
              -d "{\"mode\":\"weekly-report\"}"
          fi
