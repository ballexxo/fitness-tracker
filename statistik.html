<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fitness Tracker - Statistik</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#28c267">
  <link rel="apple-touch-icon" href="icon-192.png">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="page-shell">
    <header class="page-header">
      <a class="back-button" href="dashboard.html">←</a>
    </header>

    <section class="page-card">

      <div class="statistics-hero-box">
        <div class="statistics-subtitle">Letzte 3 Monate</div>

        <div class="statistics-chart-wrap">
          <canvas id="weightChart"></canvas>
        </div>

        <div id="weightTrendText" class="statistics-trend-text">
          Lade Statistik...
        </div>
      </div>

      <div class="statistics-cards-grid" style="margin-top: 24px;">

        <div class="statistics-mini-card">
          <div class="statistics-switch">
            <button class="active" data-type="week" data-target="workouts" type="button">Woche</button>
            <button data-type="total" data-target="workouts" type="button">Gesamt</button>
          </div>
          <div class="statistics-mini-label">Trainings</div>
          <div id="statsWorkouts" class="statistics-mini-value">-</div>
        </div>

        <div class="statistics-mini-card">
          <div class="statistics-switch">
            <button class="active" data-type="week" data-target="calories" type="button">Woche</button>
            <button data-type="total" data-target="calories" type="button">Gesamt</button>
          </div>
          <div class="statistics-mini-label">Kalorien</div>
          <div id="statsCalories" class="statistics-mini-value">-</div>
        </div>

        <div class="statistics-mini-card">
          <div class="statistics-switch">
            <button class="active" data-type="week" data-target="duration" type="button">Woche</button>
            <button data-type="total" data-target="duration" type="button">Gesamt</button>
          </div>
          <div class="statistics-mini-label">Trainingszeit</div>
          <div id="statsDuration" class="statistics-mini-value">-</div>
        </div>

        <div class="statistics-mini-card">
          <div class="statistics-switch">
            <button class="active" data-type="current" data-target="streak" type="button">Aktuell</button>
            <button data-type="best" data-target="streak" type="button">Beste</button>
          </div>
          <div class="statistics-mini-label">Live Streak</div>
          <div id="statsStreak" class="statistics-mini-value">-</div>
        </div>

      </div>

      <div class="statistics-nav-grid" style="margin-top: 28px;">

        <a href="statistics-training.html" class="statistics-nav-card is-active">
          <div class="statistics-nav-left">
            <div class="statistics-nav-title">Training</div>
            <div class="statistics-nav-sub">Progression, Leistung und Übungsfortschritt</div>
          </div>
          <div class="statistics-nav-arrow">→</div>
        </a>

        <div class="statistics-nav-card is-disabled">
          <div class="statistics-nav-left">
            <div class="statistics-nav-title">Körper</div>
            <div class="statistics-nav-sub">Gewicht, Wochenbericht und Entwicklung</div>
          </div>
          <div class="statistics-nav-badge">Bald</div>
        </div>

        <div class="statistics-nav-card is-disabled">
          <div class="statistics-nav-left">
            <div class="statistics-nav-title">Planung</div>
            <div class="statistics-nav-sub">Live Streak, Planung und Einhaltung</div>
          </div>
          <div class="statistics-nav-badge">Bald</div>
        </div>

      </div>

    </section>
  </div>

  <script type="module" src="statistik.js"></script>
</body>
</html>
