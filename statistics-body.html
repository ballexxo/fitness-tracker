<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Körper Statistik</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
  <div class="page-shell">

    <header class="page-header">
      <a class="back-button" href="statistik.html">←</a>
    </header>

    <section class="page-card">

      <!-- Zeitraum -->
      <div class="statistics-switch" id="bodyRangeSwitch">
        <button class="active" data-range="last">Letzter Bericht</button>
        <button data-range="month">4 Wochen</button>
        <button data-range="total">Gesamt</button>
      </div>

      <!-- Datentyp -->
      <div class="statistics-switch" id="bodyTypeSwitch" style="margin-top:10px;">
        <button class="active" data-type="weight">Gewicht</button>
        <button data-type="energy">Energie</button>
        <button data-type="feeling">Gefühl</button>
      </div>

      <!-- Diagramm -->
      <div class="statistics-chart-wrap">
        <canvas id="bodyChart"></canvas>
      </div>

      <div id="bodyText" class="statistics-trend-text"></div>

      <!-- Karten -->
      <div class="statistics-grid" id="bodyCards"></div>

      <!-- Motivation -->
      <div class="statistics-motivation" id="bodyMotivation"></div>

    </section>

  </div>

  <script type="module" src="statistics-body.js"></script>
</body>
</html>
