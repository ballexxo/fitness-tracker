<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fitness Tracker - Planung Statistik</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#071225">
  <link rel="apple-touch-icon" href="icon-192.png">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="page-shell page-shell-app statistics-page-modern">
    <header class="page-header app-page-header">
      <a class="app-back-button" href="statistik.html" aria-label="Zurück">
        <svg class="app-back-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M15 6L9 12L15 18"></path>
        </svg>
      </a>
    </header>

    <main class="statistics-overview-page">
      <section class="app-form-card statistics-overview-card statistics-planning-page-card">

        <div id="planningRangeSwitch" class="statistics-switch statistics-switch-modern statistics-planning-range-switch">
          <button class="active" data-range="last" type="button">Letzte Woche</button>
          <button data-range="month" type="button">4 Wochen</button>
          <button data-range="total" type="button">Gesamt</button>
        </div>

        <div class="statistics-hero-box statistics-hero-box-modern statistics-planning-hero-modern">
          <div class="statistics-chart-wrap statistics-chart-wrap-modern">
            <canvas id="planningChart"></canvas>
          </div>

          <div id="planningText" class="statistics-trend-text statistics-trend-text-modern">
            Lade Planung...
          </div>

          <div id="planningCards" class="statistics-cards-grid statistics-cards-grid-modern statistics-planning-cards-grid">
            <div class="statistics-mini-card statistics-mini-card-modern">
              <div class="statistics-mini-label">Lade...</div>
              <div class="statistics-mini-value">-</div>
            </div>
          </div>

          <div id="planningInsights" class="statistics-cards-grid statistics-cards-grid-modern statistics-planning-insights-grid">
            <div class="statistics-mini-card statistics-mini-card-modern">
              <div class="statistics-mini-label">Lade...</div>
              <div class="statistics-mini-value">-</div>
            </div>
          </div>
        </div>

      </section>
    </main>
  </div>

  <script type="module" src="statistics-planning.js"></script>
</body>
</html>
