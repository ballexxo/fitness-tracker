<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fitness Tracker - Training planen</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#071225">
  <link rel="apple-touch-icon" href="icon-192.png">
</head>
<body>
  <div class="page-shell page-shell-app">
    <header class="page-header app-page-header">
      <button class="app-back-button" type="button" onclick="history.back()" aria-label="Zurück">
        <svg class="app-back-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M15 6L9 12L15 18"></path>
        </svg>
      </button>
    </header>

    <main class="planner-page">
      <section class="app-form-card planner-page-card">
        <div class="planner-toolbar app-history-toolbar">
          <button id="prevWeekBtn" class="app-back-button history-week-nav" type="button" aria-label="Vorherige Woche">
            <svg class="app-back-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M15 6L9 12L15 18"></path>
            </svg>
          </button>

          <div class="history-range-box app-history-range-box">
            <div class="app-history-range-label">Trainingswoche</div>
            <div id="plannerRangeText" class="history-range-text app-history-range-text">-</div>
          </div>

          <button id="nextWeekBtn" class="app-back-button history-week-nav history-week-nav-next" type="button" aria-label="Nächste Woche">
            <svg class="app-back-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M15 6L9 12L15 18"></path>
            </svg>
          </button>
        </div>

        <div id="plannerStatus" class="status hidden"></div>
        <div id="plannerList" class="planner-day-list"></div>
      </section>
    </main>
  </div>

  <div id="plannerModal" class="modal-overlay hidden">
    <div class="modal-card app-modal-card planner-modal-card">
      <button id="closePlannerModalBtn" class="modal-close-x" type="button" aria-label="Schließen">×</button>
      <h2 class="app-modal-title">Trainingsplan auswählen</h2>
      <div id="plannerModalText" class="app-modal-text planner-modal-text"></div>
      <div id="plannerPlanList" class="planner-plan-list"></div>
    </div>
  </div>

  <script type="module" src="training-planner.js"></script>
  <script src="app-update.js"></script>
</body>
</html>
