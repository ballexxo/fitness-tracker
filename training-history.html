<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fitness Tracker - Training Historie</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#071225">
  <link rel="apple-touch-icon" href="icon-192.png">
</head>
<body>
  <div class="page-shell page-shell-app">
    <header class="page-header app-page-header">
      <button class="app-back-button" type="button" onclick="history.back()" aria-label="Zurück">
        <svg class="app-back-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M15 6L9 12L15 18"></path>
        </svg>
      </button>
    </header>

    <main class="history-page">
      <section class="app-form-card history-page-card">
        <div class="history-toolbar app-history-toolbar">
          <button id="prevWeekBtn" class="app-back-button history-week-nav" type="button" aria-label="Vorherige Woche">
            <svg class="app-back-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M15 6L9 12L15 18"></path>
            </svg>
          </button>

          <div class="history-range-box app-history-range-box">
            <div class="app-history-range-label">Angezeigte Woche</div>
            <div id="historyRangeText" class="history-range-text app-history-range-text">-</div>
          </div>

          <button id="nextWeekBtn" class="app-back-button history-week-nav history-week-nav-next" type="button" aria-label="Nächste Woche">
            <svg class="app-back-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M15 6L9 12L15 18"></path>
            </svg>
          </button>
        </div>

        <div id="historyStatus" class="status hidden"></div>
        <div id="historyList" class="history-session-list"></div>
      </section>
    </main>
  </div>

  <div id="viewHistoryModal" class="modal-overlay hidden">
    <div class="modal-card app-modal-card history-modal-card">
      <h2 class="app-modal-title">Training anzeigen</h2>
      <div id="viewHistoryContent" class="app-modal-content"></div>
      <div class="modal-actions app-modal-actions">
        <button id="closeViewHistoryBtn" class="dashboard-summary-primary-btn" type="button">Schließen</button>
      </div>
    </div>
  </div>

  <div id="editHistoryModal" class="modal-overlay hidden">
    <div class="modal-card app-modal-card history-modal-card history-edit-modal-card">
      <h2 class="app-modal-title">Training bearbeiten</h2>
      <div id="editHistoryContent" class="app-modal-content"></div>
      <div id="editHistoryStatus" class="status hidden"></div>
      <div class="modal-actions app-modal-actions app-modal-actions-split">
        <button id="cancelEditHistoryBtn" class="app-btn app-btn-danger" type="button">Abbrechen</button>
        <button id="saveEditHistoryBtn" class="dashboard-summary-primary-btn" type="button">Speichern</button>
      </div>
    </div>
  </div>

  <script type="module" src="training-history.js"></script>
</body>
</html>
