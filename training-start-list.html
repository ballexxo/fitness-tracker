<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fitness Tracker - Training Starten</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#071225">
  <link rel="apple-touch-icon" href="icon-192.png">
</head>
<body>
  <div class="page-shell page-shell-app">
    <header class="page-header app-page-header">
      <a class="app-back-button" href="dashboard.html" aria-label="Zurück zum Dashboard">
        <svg class="app-back-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M15 6L9 12L15 18"></path>
        </svg>
      </a>
    </header>

    <main class="app-form-page">
      <section class="app-form-card training-start-page-card">
        <div class="app-form-head training-start-head">
          <h1 class="app-form-title">Plan auswählen</h1>
          <p class="app-form-subtitle">
            Wähle den Trainingsplan aus, den du jetzt starten möchtest.
          </p>
        </div>

        <div id="trainingPlanListStatus" class="status hidden"></div>
        <div id="trainingPlanList" class="training-start-list"></div>
      </section>
    </main>
  </div>

  <script type="module" src="training-start-list.js"></script>
</body>
</html>
