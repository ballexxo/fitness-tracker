<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Persönliche Daten</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="page-shell page-shell-app">

    <header class="page-header app-page-header">
      <a class="app-back-button" href="dashboard.html" aria-label="Zurück zum Dashboard">
        <svg class="app-back-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M15 6L9 12L15 18"></path>
        </svg>
      </a>
    </header>

    <main class="personal-page">
      <section class="app-hero-card personal-hero-card">
        <div id="profileOverview">Lade Daten...</div>
      </section>

      <section class="dashboard-nav-list dashboard-nav-list-no-icons personal-nav-list">
        <a href="personal-data-form.html" class="dashboard-nav-button dashboard-nav-button-no-icon">
          <span class="nav-left nav-left-no-icon">
            <span class="nav-text">
              <span class="nav-title">Daten eintragen</span>
            </span>
          </span>
          <img class="nav-chevron-img" src="icon-chevron.svg" alt="">
        </a>

        <a href="calorie-calculator.html" class="dashboard-nav-button dashboard-nav-button-no-icon">
          <span class="nav-left nav-left-no-icon">
            <span class="nav-text">
              <span class="nav-title">Kalorienrechner</span>
            </span>
          </span>
          <img class="nav-chevron-img" src="icon-chevron.svg" alt="">
        </a>

        <a href="weekly-report.html" class="dashboard-nav-button dashboard-nav-button-no-icon">
          <span class="nav-left nav-left-no-icon">
            <span class="nav-text">
              <span class="nav-title">Wochenbericht</span>
            </span>
          </span>
          <img class="nav-chevron-img" src="icon-chevron.svg" alt="">
        </a>

        <div class="dashboard-nav-button dashboard-nav-button-no-icon personal-push-row" id="pushNotificationRow">
          <span class="nav-left nav-left-no-icon">
            <span class="nav-text">
              <span class="nav-title">Push-Benachrichtigungen</span>
              <span class="personal-push-subtext" id="pushStatusText">Wird geladen...</span>
            </span>
          </span>

          <button
            id="pushToggle"
            class="push-toggle"
            type="button"
            role="switch"
            aria-checked="false"
            aria-label="Push-Benachrichtigungen umschalten">
            <span class="push-toggle-track">
              <span class="push-toggle-thumb"></span>
            </span>
          </button>
        </div>
      </section>
    </main>

  </div>

  <script type="module" src="personal-data.js"></script>
  <script src="app-update.js"></script>
</body>
</html>
