<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <meta name="theme-color" content="#071225">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>Fitness Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-page-inner">
      <header class="auth-header-modern">
        <h1 class="auth-brand">Fitness Tracker</h1>
        <p class="auth-subtitle">Login und Registrierung</p>
      </header>

      <section class="app-form-card auth-card-modern">
        <div class="auth-tabs-modern">
          <button class="tab-btn auth-tab-btn active" data-tab="login" type="button">Login</button>
          <button class="tab-btn auth-tab-btn" data-tab="register" type="button">Registrieren</button>
        </div>

        <div id="loginTab" class="auth-tab-panel">
          <h2 class="auth-title">Anmelden</h2>
          <p class="auth-description">Melde dich mit deiner E-Mail und deinem Passwort an.</p>

          <form id="loginForm" class="auth-form-modern">
            <div class="auth-field">
              <label for="loginEmail" class="auth-label">E-Mail</label>
              <input id="loginEmail" class="auth-input" type="email" required>
            </div>

            <div class="auth-field">
              <label for="loginPassword" class="auth-label">Passwort</label>
              <input id="loginPassword" class="auth-input" type="password" required>
            </div>

            <button id="loginBtn" class="dashboard-summary-primary-btn auth-submit-btn" type="submit">
              Einloggen
            </button>
          </form>

          <div id="loginStatus" class="status hidden"></div>
        </div>

        <div id="registerTab" class="auth-tab-panel hidden">
          <h2 class="auth-title">Registrieren</h2>
          <p class="auth-description">Erstelle dein Konto mit Name, E-Mail und Passwort.</p>

          <form id="registerForm" class="auth-form-modern">
            <div class="auth-field">
              <label for="registerName" class="auth-label">Name</label>
              <input id="registerName" class="auth-input" type="text" required>
            </div>

            <div class="auth-field">
              <label for="registerEmail" class="auth-label">E-Mail</label>
              <input id="registerEmail" class="auth-input" type="email" required>
            </div>

            <div class="auth-field">
              <label for="registerPassword" class="auth-label">Passwort</label>
              <input id="registerPassword" class="auth-input" type="password" required>
            </div>

            <button id="registerBtn" class="dashboard-summary-primary-btn auth-submit-btn" type="submit">
              Registrieren
            </button>
          </form>

          <div id="registerStatus" class="status hidden"></div>
        </div>
      </section>
    </div>
  </div>

  <script type="module" src="auth.js"></script>
  <script src="app-update.js"></script>
</body>
</html>
