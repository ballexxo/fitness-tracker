<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fitness Tracker - Trainingsplan hinzufügen</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#071225">
  <link rel="apple-touch-icon" href="icon-192.png">
</head>
<body>
  <div class="page-shell page-shell-app">
    <header class="page-header app-page-header">
      <button class="app-back-button" type="button" onclick="history.back()" aria-label="Zurück">
        <svg class="app-back-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M15 6L9 12L15 18"></path>
        </svg>
      </button>
    </header>

    <main class="plan-add-page">
      <section class="app-form-card plan-add-card">
        <div class="plan-add-field">
          <label for="planName" class="plan-add-label">Trainingsplan benennen</label>
          <input id="planName" class="plan-add-input" type="text" placeholder="Zum Beispiel Push" required>
        </div>

        <div id="exerciseList" class="plan-add-exercise-list"></div>

        <div class="plan-add-plus-wrap">
          <button id="openExerciseModalBtn" class="plan-add-plus-btn" type="button" aria-label="Übung hinzufügen">+</button>
        </div>

        <div id="planStatus" class="status hidden"></div>

        <div class="plan-add-save-wrap">
          <button id="savePlanBtn" class="dashboard-summary-primary-btn plan-add-save-btn" type="button">
            Speichern
          </button>
        </div>
      </section>
    </main>
  </div>

  <div id="exerciseModal" class="modal-overlay hidden">
    <div class="modal-card app-modal-card plan-exercise-modal-card">
      <button id="closeExerciseModalBtn" class="modal-close-x" type="button" aria-label="Schließen">×</button>
      <h2 id="modalTitle" class="app-modal-title">Übung hinzufügen</h2>

      <div class="app-modal-content">
  <form id="exerciseForm" class="app-form plan-exercise-form">
    <div class="plan-exercise-row">
      <label class="plan-add-label" for="exerciseName">Übung</label>
      <input id="exerciseName" class="plan-add-input" type="text" placeholder="Zum Beispiel Bankdrücken" required>
    </div>

    <div class="plan-exercise-row">
      <label class="plan-add-label" for="exerciseSets">Sätze</label>
      <select id="exerciseSets" class="plan-add-input" required>
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3" selected>3</option>
        <option value="4">4</option>
        <option value="5">5</option>
        <option value="6">6</option>
        <option value="7">7</option>
        <option value="8">8</option>
      </select>
    </div>

    <div class="plan-exercise-row">
  <label class="plan-add-label">Wdh.</label>

  <div class="plan-reps-group">
    <input id="exerciseRepsMin" class="plan-add-input" type="number" min="1" placeholder="min" required>

    <span class="plan-reps-separator">–</span>

    <input id="exerciseRepsMax" class="plan-add-input" type="number" min="1" placeholder="max" required>
  </div>
</div>
    <div class="plan-exercise-row">
      <label class="plan-add-label" for="exerciseRest">Pause in Sekunden</label>
      <input id="exerciseRest" class="plan-add-input" type="number" min="0" placeholder="120" required>
    </div>
  </form>

  <div id="exerciseStatus" class="status hidden"></div>
</div>

      <div class="modal-actions app-modal-actions">
        <button id="confirmExerciseBtn" class="dashboard-summary-primary-btn" type="button">
          Hinzufügen
        </button>
      </div>
    </div>
  </div>

  <div id="successModal" class="modal-overlay hidden">
    <div class="modal-card app-modal-card plan-exercise-success-card">
      <h2 class="app-modal-title">Trainingsplan angelegt</h2>
      <div class="app-modal-text">
        Dein Trainingsplan wurde erfolgreich gespeichert.
      </div>

      <div class="modal-actions app-modal-actions">
        <button id="successOkBtn" class="dashboard-summary-primary-btn" type="button">OK</button>
      </div>
    </div>
  </div>

  <script type="module" src="trainingsplan-add.js"></script>
</body>
</html>
